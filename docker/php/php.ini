; Limiti pensati per ingestione batch e generazione di export.
; L'export NON tiene le righe in memoria (OpenSpout fa streaming su disco),
; quindi memory_limit resta contenuto anche per file da 500k righe.
memory_limit = 512M

; Upload e POST grandi per l'ingestione in batch.
upload_max_filesize = 64M
post_max_size = 64M

; Il timeout HTTP serve solo a richieste sincrone (ingestione, preview):
; gli export pesanti girano nei worker di coda, fuori dal ciclo richiesta.
max_execution_time = 120

date.timezone = UTC

; OPcache: forte beneficio su PHP-FPM in produzione.
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 128
opcache.max_accelerated_files = 10000
opcache.validate_timestamps = 1
