# ---------------------------------------------------------------------------
# Topologia dei servizi. Ogni container ha una singola responsabilita':
#   app    -> PHP-FPM (gestisce le richieste HTTP)
#   nginx  -> reverse proxy / web server statico davanti a PHP-FPM
#   worker -> stesso codice di `app`, ma esegue `queue:work` (export asincroni)
#   mysql  -> storage dati (eventi, player, export, ...)
#   redis  -> cache + (opzionale) backend di coda ad alte prestazioni
# ---------------------------------------------------------------------------
version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: export_app
    restart: unless-stopped
    volumes:
      - ./:/var/www/html
    env_file: .env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  nginx:
    image: nginx:1.21-alpine
    container_name: export_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: export_worker
    restart: unless-stopped
    volumes:
      - ./:/var/www/html
    env_file: .env
    # --timeout deve essere >= EXPORT_JOB_TIMEOUT; --tries abilita il retry automatico.
    command: php artisan queue:work --tries=3 --timeout=3600 --sleep=1 --max-jobs=200
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  mysql:
    image: mysql:8.0
    container_name: export_mysql
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: export_engine
      MYSQL_USER: export
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "33060:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:6-alpine
    container_name: export_redis
    restart: unless-stopped
    ports:
      - "63790:6379"

volumes:
  mysql_data:
